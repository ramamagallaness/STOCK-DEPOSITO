<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Depósito</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 30px 20px;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .subtitulo {
    font-size: 13px;
    color: #777;
    margin-bottom: 28px;
  }

  .panel {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  .panel h2 {
    font-size: 14px;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 14px;
  }

  .fila-accion {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .campo {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .campo label {
    font-size: 12px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .campo select,
  .campo input[type="text"],
  .campo input[type="number"] {
    height: 40px;
    padding: 0 12px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-size: 14px;
    background: #fafafa;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
  }

  .campo select:focus,
  .campo input:focus {
    border-color: #333;
    background: #fff;
  }

  .campo select { min-width: 260px; }
  .campo input[type="number"] { width: 100px; }

  .btn-mas {
    height: 40px;
    padding: 0 22px;
    background: #1a7f4b;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-mas:hover { background: #155f38; }

  .btn-menos {
    height: 40px;
    padding: 0 22px;
    background: #c0392b;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-menos:hover { background: #96281b; }

  .btn-reset {
    height: 40px;
    padding: 0 16px;
    background: transparent;
    color: #999;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-reset:hover { border-color: #c0392b; color: #c0392b; }

  .msg {
    margin-top: 12px;
    font-size: 13px;
    font-weight: 600;
    min-height: 20px;
    padding: 6px 10px;
    border-radius: 6px;
    display: none;
  }
  .msg.ok { background: #e6f4ee; color: #1a7f4b; display: block; }
  .msg.error { background: #fdecea; color: #c0392b; display: block; }

  .tabla-wrap {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    overflow: hidden;
  }

  .tabla-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid #f0f0f0;
    flex-wrap: wrap;
    gap: 10px;
  }

  .tabla-header h2 {
    font-size: 14px;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  #buscador {
    height: 34px;
    padding: 0 12px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-size: 13px;
    width: 200px;
    outline: none;
    background: #fafafa;
  }
  #buscador:focus { border-color: #333; background: #fff; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    text-align: left;
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #999;
    background: #fafafa;
    border-bottom: 1px solid #f0f0f0;
  }

  tbody tr {
    border-bottom: 1px solid #f5f5f5;
    transition: background 0.1s;
  }
  tbody tr:hover { background: #fafafa; }
  tbody tr:last-child { border-bottom: none; }

  td { padding: 11px 16px; vertical-align: middle; }

  .sku { font-weight: 600; font-family: monospace; font-size: 13px; }

  .badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    background: #f0f0f0;
    color: #555;
  }

  .cant { font-size: 15px; font-weight: 700; }
  .cant-depo { color: #1a7f4b; }
  .cant-pick { color: #d4a017; }
  .cant-total { color: #1a1a1a; font-size: 16px; }
  .cant-baja { color: #c0392b !important; }

  .mov-wrap {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    margin-top: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  .mov-wrap h2 {
    font-size: 14px;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
  }

  #lista-mov {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 200px;
    overflow-y: auto;
  }

  .mov-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 12px;
    border-radius: 7px;
    background: #fafafa;
    font-size: 13px;
  }

  .mov-item .mov-info { color: #555; }
  .mov-item .mov-signo { font-weight: 700; font-size: 14px; }
  .mov-item .mov-pos { color: #1a7f4b; }
  .mov-item .mov-neg { color: #c0392b; }
  .mov-item .mov-hora { font-size: 11px; color: #bbb; }

  .sin-mov { font-size: 13px; color: #bbb; }

  .radio-group { display: flex; gap: 12px; align-items: center; }
  .radio-group label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 14px;
    font-weight: 500;
    color: #333;
    cursor: pointer;
  }
  .radio-group input[type="radio"] { cursor: pointer; }
</style>
</head>
<body>

<h1>📦 Control de Stock</h1>
<p class="subtitulo">Depósito + Picking — actualizá el stock ingresando producto, cantidad y ubicación</p>

<div class="panel">
  <h2>Registrar movimiento</h2>
  <div class="fila-accion">
    <div class="campo">
      <label>Producto (SKU)</label>
      <select id="sel-sku">
        <option value="">— Seleccioná un SKU —</option>
      </select>
    </div>
    <div class="campo">
      <label>Ubicación</label>
      <div class="radio-group" style="height:40px;">
        <label><input type="radio" name="lugar" value="deposito" checked> Depósito</label>
        <label><input type="radio" name="lugar" value="picking"> Picking</label>
      </div>
    </div>
    <div class="campo">
      <label>Cantidad</label>
      <input type="number" id="cant-input" value="1" min="1">
    </div>
    <button class="btn-mas" onclick="mover(1)">+ Ingreso</button>
    <button class="btn-menos" onclick="mover(-1)">− Egreso</button>
    <button class="btn-reset" onclick="resetearTodo()">↺ Resetear todo</button>
  </div>
  <div class="msg" id="msg"></div>
</div>

<div class="tabla-wrap">
  <div class="tabla-header">
    <h2>Stock actual</h2>
    <input type="text" id="buscador" placeholder="Buscar SKU..." oninput="filtrar()">
  </div>
  <table>
    <thead>
      <tr>
        <th>SKU</th>
        <th>Rack</th>
        <th>Posición</th>
        <th>Depósito</th>
        <th>Picking</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="mov-wrap">
  <h2>Últimos movimientos</h2>
  <div id="lista-mov"><span class="sin-mov">Sin movimientos aún.</span></div>
</div>

<script>
// ─── DATOS INICIALES (se usan solo la primera vez) ───────────────────
const PRODUCTOS_INICIALES = [
  { sku: "BATIDORA-TURBO-220V",   rack: "A", pos: "25",          deposito: 84,  picking: 4  },
  { sku: "BATIDORA-TURBO-220V",   rack: "C", pos: "12",          deposito: 60,  picking: 0  },
  { sku: "BOMBA-ELECTRICA-DISP",  rack: "A", pos: "6",           deposito: 129, picking: 3  },
  { sku: "TAZA-AUTOMATICA-BROWN", rack: "-", pos: "-",           deposito: 0,   picking: 6  },
  { sku: "TAZA-AUTOMATICA-GREY",  rack: "-", pos: "-",           deposito: 0,   picking: 90 },
  { sku: "MESA-RATONA-WHITE",     rack: "C", pos: "13-14-15-16", deposito: 48,  picking: 0  },
  { sku: "MESA-RATONA-BROWN",     rack: "C", pos: "8",           deposito: 4,   picking: 0  },
  { sku: "MESA-RATONA-MARBLE",    rack: "C", pos: "10",          deposito: 7,   picking: 0  },
  { sku: "BOTELLA-AGUA-PINK",     rack: "B", pos: "12",          deposito: 60,  picking: 4  },
  { sku: "BOTELLA-AGUA-YELLOW",   rack: "B", pos: "12",          deposito: 73,  picking: 2  },
  { sku: "BOT-WATER-FOOD-PINK",   rack: "A", pos: "12",          deposito: 40,  picking: 4  },
  { sku: "BOT-WATER-FOOD-YELLOW", rack: "A", pos: "12",          deposito: 40,  picking: 4  },
];

// ─── CARGAR DESDE localStorage O USAR INICIALES ──────────────────────
function cargarDatos() {
  const guardado = localStorage.getItem('stock_productos');
  return guardado ? JSON.parse(guardado) : JSON.parse(JSON.stringify(PRODUCTOS_INICIALES));
}

function cargarMovimientos() {
  const guardado = localStorage.getItem('stock_movimientos');
  return guardado ? JSON.parse(guardado) : [];
}

function guardarDatos() {
  localStorage.setItem('stock_productos', JSON.stringify(productos));
  localStorage.setItem('stock_movimientos', JSON.stringify(movimientos));
}

let productos = cargarDatos();
let movimientos = cargarMovimientos();

// ─── RESETEAR TODO ───────────────────────────────────────────────────
function resetearTodo() {
  if (!confirm('¿Seguro que querés resetear todo al stock inicial? Se borrarán todos los movimientos.')) return;
  productos = JSON.parse(JSON.stringify(PRODUCTOS_INICIALES));
  movimientos = [];
  guardarDatos();
  cargarSelect();
  renderTabla();
  renderMovimientos();
  mostrarMsg('Stock reseteado a los valores iniciales.', true);
}

// ─── SELECT ───────────────────────────────────────────────────────────
function cargarSelect() {
  const sel = document.getElementById('sel-sku');
  sel.innerHTML = '<option value="">— Seleccioná un SKU —</option>';
  productos.forEach((p, i) => {
    const label = p.rack !== '-'
      ? `${p.sku}  [Rack ${p.rack} — Pos. ${p.pos}]`
      : `${p.sku}  [Picking]`;
    sel.innerHTML += `<option value="${i}">${label}</option>`;
  });
}

// ─── MOVER STOCK ──────────────────────────────────────────────────────
function mover(signo) {
  const idx = parseInt(document.getElementById('sel-sku').value);
  const cantVal = parseInt(document.getElementById('cant-input').value);
  const lugar = document.querySelector('input[name="lugar"]:checked').value;

  if (isNaN(idx)) { mostrarMsg('Seleccioná un producto.', false); return; }
  if (!cantVal || cantVal < 1) { mostrarMsg('Ingresá una cantidad válida.', false); return; }

  const p = productos[idx];
  const campo = lugar === 'deposito' ? 'deposito' : 'picking';
  const nuevoValor = p[campo] + (signo * cantVal);

  if (nuevoValor < 0) {
    mostrarMsg(`Stock insuficiente en ${lugar}. Hay ${p[campo]} unidades.`, false);
    return;
  }

  p[campo] = nuevoValor;

  const ahora = new Date();
  const hora = ahora.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  const fecha = ahora.toLocaleDateString('es-AR');

  movimientos.unshift({
    sku: p.sku,
    lugar,
    accion: signo > 0 ? 'INGRESO' : 'EGRESO',
    cantidad: cantVal,
    signo,
    hora: `${fecha} ${hora}`
  });

  guardarDatos(); // ← guarda todo en el navegador

  mostrarMsg(`${signo > 0 ? 'INGRESO' : 'EGRESO'}: ${cantVal} unidades de ${p.sku} en ${lugar}.`, true);
  renderTabla();
  renderMovimientos();
}

function mostrarMsg(texto, ok) {
  const msg = document.getElementById('msg');
  msg.textContent = texto;
  msg.className = 'msg ' + (ok ? 'ok' : 'error');
  setTimeout(() => { msg.className = 'msg'; }, 3000);
}

// ─── RENDER TABLA ─────────────────────────────────────────────────────
function renderTabla(filtro = '') {
  const tbody = document.getElementById('tbody');
  const term = filtro.toLowerCase();
  const lista = productos.filter(p => p.sku.toLowerCase().includes(term));

  if (lista.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#bbb;padding:20px;">Sin resultados</td></tr>';
    return;
  }

  tbody.innerHTML = lista.map(p => {
    const total = p.deposito + p.picking;
    const claseTotal = total <= 5 ? 'cant cant-total cant-baja' : 'cant cant-total';
    return `
      <tr>
        <td class="sku">${p.sku}</td>
        <td><span class="badge">${p.rack}</span></td>
        <td>${p.pos}</td>
        <td class="cant cant-depo">${p.deposito}</td>
        <td class="cant cant-pick">${p.picking}</td>
        <td class="${claseTotal}">${total}</td>
      </tr>`;
  }).join('');
}

function filtrar() {
  renderTabla(document.getElementById('buscador').value);
}

// ─── RENDER MOVIMIENTOS ───────────────────────────────────────────────
function renderMovimientos() {
  const lista = document.getElementById('lista-mov');
  if (movimientos.length === 0) {
    lista.innerHTML = '<span class="sin-mov">Sin movimientos aún.</span>';
    return;
  }
  lista.innerHTML = movimientos.slice(0, 50).map(m => {
    const cls = m.signo > 0 ? 'mov-pos' : 'mov-neg';
    const signo = m.signo > 0 ? '+' : '−';
    return `
      <div class="mov-item">
        <span class="mov-info"><b>${m.sku}</b> — ${m.lugar}</span>
        <span class="mov-signo ${cls}">${signo}${m.cantidad}</span>
        <span class="mov-hora">${m.hora}</span>
      </div>`;
  }).join('');
}

// ─── INIT ─────────────────────────────────────────────────────────────
cargarSelect();
renderTabla();
renderMovimientos();
</script>
</body>
</html>
